[build]
  command = "node build.js"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# Redirection propre pour les pages projet dynamiques (facultatif, la query string suffit)
[[redirects]]
  from = "/projets/*"
  to = "/projet.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
