title: Le mouvement avant le digital.
subtitle: Danser m'a appris à créer avec le corps, le regard, le rythme et
  l'intention. Aujourd'hui, je mets cette même énergie dans les projets que
  j'accompagne.
intro_text: "Avant même de créer des sites ou du contenu, il y avait le
  mouvement. La danse a façonné ma manière de voir les choses : le rythme,
  l'espace, la présence, l'émotion, le détail qu'on remarque sans forcément
  savoir pourquoi. Être danseuse m'a appris à me montrer, à prendre place, à
  m'exprimer devant les autres et à assumer une intention. Aujourd'hui, cette
  énergie se retrouve dans La Malice : je crée des contenus, des sites et des
  univers digitaux qui ne sont pas seulement beaux, mais vivants, incarnés et
  pensés pour marquer."
dance_text: "La danse m'a appris que ce qu'on montre compte autant que la
  manière dont on le montre. Un geste, un regard, une coupe, un rythme, un
  silence : tout peut se raconter, tout peut se ressentir. C'est cette
  sensibilité que je cherche à retranscrire dans mes projets."
career_text: "À côté de mon parcours artistique, j'ai suivi un Bachelor en
  Management à HEC Lausanne et je me suis formée à travers plusieurs expériences
  en marketing, communication, social media et gestion de projets. Cette double
  casquette m'a permis de créer avec intuition, mais aussi avec structure :
  comprendre un besoin, clarifier un message, penser une stratégie simple et
  construire une présence digitale cohérente."
structure_title: Entre instinct créatif et structure
structure_text: La Malice mélange ma sensibilité artistique avec expérience de
  terrain, communication digitale, stratégie, création de contenu, design web et
  événementiel.
